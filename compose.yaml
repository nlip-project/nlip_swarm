services:
  frontend:
    build:
      context: ./frontend
    tty: true
    stdin_open: true
    ports:
      - 8081:8081
      - 19000:19000
      - 19001:19001
      - 19002:19002
  backend:
    build:
      context: ./backend
    ports:
      # Backend listens on 8024; expose same port to host so mobile can reach it
      - 8024:8024
    models:
      llm:
        endpoint_var: OLLAMA_URL
        model_var: OLLAMA_MODEL
      translation:
        endpoint_var: TRANSLATION_URL
        model_var: TRANSLATION_MODEL
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dockermodelrunner}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/nlip_db
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nlip_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
 
volumes:
  db_data:
    name: db_data

models:
  llm:
    model: ai/llama3.1:8B-Q4_K_M
    context_size: 4096
  translation:
    model: ai/llama3.1:8B-Q4_K_M
    context_size: 4096
