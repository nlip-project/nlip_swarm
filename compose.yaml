services:
  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true
    ports:
      - 8081:8081
      - 19000:19000
      - 19001:19001
      - 19002:19002
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/app/.env
    ports:
      # Backend listens on 8024; expose same port to host so mobile can reach it
      - 8024:8024
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/nlip_db
        # Pass your OpenAI/Cerebras API key through; set OPENAI_API_KEY in your shell before compose up or set it in a .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nlip_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
      # - 5433:5432 # Alternative port mapping if you want to access the DB from host

volumes:
  db_data:
    name: db_data
